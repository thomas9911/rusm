# rusm.toml — startup configuration for `rusm node start`.
#
# Layering: built-in defaults → this file → CLI flags. So `--listen` / `--profile`
# on the command line override what's here, and this file overrides the defaults.
# Every field is optional; unknown fields are rejected (to catch typos).

# --- The node's own settings (endpoint, throughput dial, durable store) ----------
[node]

# WebSocket address the node listens on (the dashboard and `rusm attach` connect here).
listen = "127.0.0.1:4000"

# Starting resource profile — the throughput dial (spawn workers, relative to cores):
#   light    — ~¼ of cores; gentle, throughput isn't the point
#   balanced — ~⅖ of cores; good throughput with headroom (default)
#   max      — ~½ of cores; most performant (spawners balanced against reapers), still smooth
# It can also be changed live from the dashboard while the node runs.
profile = "balanced"

# Snapshot / sampling rate in Hz (10–60).
ticks_per_second = 20

# --- App model (used by `rusm run` / `rusm dev`) -----------------------------
#
# Custom capability profiles — like Cargo's `[profile.<name>]`. A profile
# `inherits` a built-in base (sandboxed | network-client | trusted; default
# sandboxed = default-deny) and overrides only the grants it sets. Components
# reference one by name via `capability = "<name>"`; an unknown name falls back
# to the secure sandboxed default. A spawned child never exceeds its spawner.
#
# [capabilities.agent]
# inherits = "network-client"   # base; omit for sandboxed (default-deny)
# spawn = true                  # may spawn other components by name
# process-control = false       # may kill/list/inspect other processes
# stdio = false                 # inherit host stdio
# max-memory-mb = 256           # per-process heap ceiling
# env = ["OPENAI_API_KEY"]      # grant these keys (values from process env / .env)
# preopen = [{ host = "./data", guest = "/data", read-only = false }]

# Components, keyed by name. Each loads from ./wasm/<name>.{wasm,js} (Rust
# component or TS bundle) and is registered under its capability profile so a
# route or sibling can spawn it by name. `resident = true` additionally
# boot-spawns it at startup and supervises it (auto-restarted on crash).
#
# [components.pages-agent]
# capability = "agent"          # a custom profile above, or a built-in
# resident = true               # long-lived service: boot-spawned + supervised
