[package]
name = "rusm-wasm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "The Wasmtime backend for RUSM: each process runs as an isolated Wasm instance."

[dependencies]
rusm-otp = { path = "../rusm-otp" }
anyhow = { workspace = true }
tokio = { version = "1.52.3", features = ["rt", "rt-multi-thread", "macros", "time"] }
wasmtime = "45.0.1"
# Default features give WASI p1 + p2; `p3` adds preview3 (native async/streams).
wasmtime-wasi = { version = "45.0.1", features = ["p3"] }
