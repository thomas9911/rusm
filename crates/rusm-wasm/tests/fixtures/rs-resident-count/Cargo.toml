# A resident HTTP handler that proves state persists across requests: a counter
# whose `&mut self` lives for the process's lifetime. `run` drives
# `rusm_rs::http::serve`. Built for wasm32-wasip2, checked in as rs_resident_count.wasm.
#   cargo build --target wasm32-wasip2 --release
#   cp target/wasm32-wasip2/release/rs_resident_count.wasm ../rs_resident_count.wasm
[workspace]

[package]
name = "rs-resident-count"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]
name = "rs_resident_count"

[profile.release]
opt-level = "z"
strip = true

[dependencies]
rusm-rs = { path = "../../../../rusm-rs" }
wit-bindgen = "0.46"
