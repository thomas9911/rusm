# A per-connection SSE *pump*: subscribes to the `broker`, then turns each
# broadcast event into an SSE `data:` frame on the connection's stream, with a
# heartbeat on idle. Built for wasm32-wasip2, checked in.
#   cargo build --target wasm32-wasip2 --release
#   cp target/wasm32-wasip2/release/sse_pump.wasm ../sse_pump.wasm
[workspace]

[package]
name = "sse-pump"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]
name = "sse_pump"

[profile.release]
opt-level = "z"
strip = true

[dependencies]
rusm-rs = { path = "../../../../rusm-rs" }
wit-bindgen = "0.46"
