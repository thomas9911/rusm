# A wasi:http SSE component (raw wasi:http, no wstd): streams `text/event-stream`
# events over time. Built for wasm32-wasip2 and checked in (the rusm-wasm SSE test loads it):
#   cargo build --target wasm32-wasip2 --release
#   cp target/wasm32-wasip2/release/sse_ticker.wasm ../sse_ticker.wasm
[package]
name = "sse-ticker"
version = "0.0.0"
edition = "2021"
autobins = false

[dependencies]
wasip2 = "1.0.3"

[lib]
crate-type = ["cdylib"]
name = "sse_ticker"
path = "src/main.rs"

[workspace]
