# A wasi:http SSE component (via wstd): streams `text/event-stream` events over
# time. Built for wasm32-wasip2 and checked in (the rusm-wasm SSE serve test loads it):
#   cargo build --target wasm32-wasip2 --release
#   cp target/wasm32-wasip2/release/sse_ticker.wasm ../sse_ticker.wasm
[package]
name = "sse-ticker"
version = "0.0.0"
edition = "2021"

[dependencies]
wstd = "0.6.6"
futures-lite = "2"
anyhow = "1"

[[bin]]
name = "sse_ticker"
path = "src/main.rs"

[workspace]
