# A guest fixture exercising the `rusm-rs` receive-with-timeout helpers
# (`receive_bytes_timeout` / `receive_timeout::<T>`) — the Rust twin of the TS
# `Process.receive(ms)` test. Built for wasm32-wasip2, checked in as
# rs_timeout.wasm. Regenerate:
#   cargo build --target wasm32-wasip2 --release
#   cp target/wasm32-wasip2/release/rs_timeout.wasm ../rs_timeout.wasm
[workspace]

[package]
name = "rs-timeout"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]
name = "rs_timeout"

[profile.release]
opt-level = "z"
strip = true

[dependencies]
rusm-rs = { path = "../../../../rusm-rs" }
wit-bindgen = "0.46"
