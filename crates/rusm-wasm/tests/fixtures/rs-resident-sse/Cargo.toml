# A resident SSE handler: streams a few `text/event-stream` events per request via
# rusm_rs::http::serve_sse. Built for wasm32-wasip2, checked in as rs_resident_sse.wasm.
#   cargo build --target wasm32-wasip2 --release
#   cp target/wasm32-wasip2/release/rs_resident_sse.wasm ../rs_resident_sse.wasm
[workspace]

[package]
name = "rs-resident-sse"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]
name = "rs_resident_sse"

[profile.release]
opt-level = "z"
strip = true

[dependencies]
rusm-rs = { path = "../../../../rusm-rs" }
wit-bindgen = "0.46"
