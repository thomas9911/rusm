# A guest fixture exercising process-group tags via the ergonomic `rusm-rs` API
# (register_tag / kill_tag / whereis_tag). Built for wasm32-wasip2, checked in as
# rs_tag.wasm. Regenerate:
#   cargo build --target wasm32-wasip2 --release
#   cp target/wasm32-wasip2/release/rs_tag.wasm ../rs_tag.wasm
[workspace]

[package]
name = "rs-tag"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]
name = "rs_tag"

[profile.release]
opt-level = "z"
strip = true

[dependencies]
rusm-rs = { path = "../../../../rusm-rs" }
wit-bindgen = "0.46"
