# A guest fixture using the ergonomic `rusm-rs` kv module (durable storage). Built
# for wasm32-wasip2, checked in as rs_kv.wasm. Regenerate:
#   cargo build --target wasm32-wasip2 --release
#   cp target/wasm32-wasip2/release/rs_kv.wasm ../rs_kv.wasm
[workspace]

[package]
name = "rs-kv"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]
name = "rs_kv"

[profile.release]
opt-level = "z"
strip = true

[dependencies]
rusm-rs = { path = "../../../../rusm-rs" }
wit-bindgen = "0.46"
