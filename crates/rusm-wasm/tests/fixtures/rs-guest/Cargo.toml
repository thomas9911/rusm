# A guest fixture that uses the ergonomic `rusm-rs` crate (the Rust guest API) —
# proves the wit-bindgen library/binary split: this crate depends on rusm-rs and
# `rusm_rs::export!`s its component. Built for wasm32-wasip2, checked in as
# rs_guest.wasm. Regenerate:
#   cargo build --target wasm32-wasip2 --release
#   cp target/wasm32-wasip2/release/rs_guest.wasm ../rs_guest.wasm
[workspace]

[package]
name = "rs-guest"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]
name = "rs_guest"

[profile.release]
opt-level = "z"
strip = true

[dependencies]
rusm-rs = { path = "../../../../rusm-rs" }
wit-bindgen = "0.46"
