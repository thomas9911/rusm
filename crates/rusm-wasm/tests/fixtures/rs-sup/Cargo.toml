# A supervisor: supervises the `flaky` child (one-for-one). Built for
# wasm32-wasip2; checked in.
#   cargo build --target wasm32-wasip2 --release
#   cp target/wasm32-wasip2/release/rs_sup.wasm ../rs_sup.wasm
[workspace]
[package]
name = "rs-sup"
version = "0.0.0"
edition = "2021"
publish = false
[lib]
crate-type = ["cdylib"]
name = "rs_sup"
[profile.release]
opt-level = "z"
strip = true
[dependencies]
rusm-rs = { path = "../../../../rusm-rs" }
wit-bindgen = "0.46"
