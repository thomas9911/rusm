# A two-component TypeScript app: a `calc` service + a `commander` that calls it
# through the concealed typed client. Build with `rusm build` (Bun bundles each
# index.ts), then `rusm run`.

# A custom profile for the commander: it needs to spawn the service, plus stdio
# for console.log. (Inherits the built-in `trusted` base.)
[capabilities.orchestrator]
inherits = "trusted"

[components.calc]         # a service; registered so the commander can spawn it
capability = "sandboxed"

[components.commander]    # boot-spawned worker that drives the demo
capability = "orchestrator"
resident = true
